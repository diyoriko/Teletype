name: Agents Hourly Report

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  run-agents-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Run Tester
        id: tester
        run: npm run agent:tester
        continue-on-error: true

      - name: Run Developer (dry-run in CI)
        id: developer
        run: DEVELOPER_DRY_RUN=1 npm run agent:developer
        continue-on-error: true

      - name: Build markdown report
        run: |
          python3 scripts/agents/report_markdown.py > test-results/agent/report.md
          cat test-results/agent/report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload agent artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-reports-${{ github.run_id }}
          path: test-results/agent
          if-no-files-found: warn

      - name: Update hourly report issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'test-results/agent/report.md';
            const report = fs.existsSync(reportPath)
              ? fs.readFileSync(reportPath, 'utf8')
              : '# Codex Agents Report\n\nReport file missing.';

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = 'Codex Agents: Latest Hourly Report';

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            let issue = issues.find(i => i.title === title && !i.pull_request);
            if (!issue) {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body: report,
              });
              issue = created.data;
            } else {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issue.number,
                body: report,
              });
            }

            core.info(`Updated issue #${issue.number}`);

      - name: Fail job if tester failed
        if: steps.tester.outcome != 'success'
        run: |
          echo "Tester failed (expected if design diverges). Marking workflow as failed for visibility."
          exit 1
